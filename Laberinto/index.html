<!DOCTYPE html>
<html>
<head>
    <title>Operación Tarasca</title>
    <meta charset="utf-8">
    <script type="text/javascript" src="../libs/jquery.js"></script>

    <script type="importmap">
    {
      "imports": {
        "three": "../libs/three.module.js",
        "gui": "../libs/dat.gui.module.js",
        "trackball": "../libs/TrackballControls.js"
      }
    }
    </script>

    <script type="module" src="./MyScene.js?v=feria-18"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #2d353b;
        }

        #Hud {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            display: flex;
            gap: 12px;
            align-items: center;
            color: white;
            font-size: 15px;
            line-height: 1;
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.65);
        }

        #Hud strong {
            font-size: 18px;
            font-weight: 700;
        }

        #HudMessage {
            min-width: 210px;
            opacity: 0.9;
        }

        #Crosshair {
            position: absolute;
            left: 50%;
            top: 50%;
            z-index: 10;
            width: 14px;
            height: 14px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="Hud">
        <strong id="PickupCounter">0/4</strong>
        <span id="HudMessage">Operación Tarasca</span>
    </div>
    <div id="Crosshair"></div>
    <div id="WebGL-output"></div>
</body>
</html>
